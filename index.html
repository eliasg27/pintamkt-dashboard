<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pintamkt — Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.09);
    --border-md: rgba(0,0,0,0.15);
    --text: #1a1a18;
    --muted: #6b6a65;
    --faint: #9c9a92;
    --accent: #1D9E75;
    --accent-dark: #0F6E56;
    --radius: 10px;
    --radius-lg: 14px;
    --font: 'Inter', -apple-system, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --surface: #1c1c1a;
      --border: rgba(255,255,255,0.08);
      --border-md: rgba(255,255,255,0.15);
      --text: #e8e6e0;
      --muted: #9c9a92;
      --faint: #6b6a65;
    }
  }

  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

  /* TOPBAR */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 1.5rem; height: 52px;
  }
  .logo { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .period-select {
    font-size: 12px; padding: 5px 10px; border-radius: 8px;
    border: 0.5px solid var(--border-md); background: var(--bg);
    color: var(--text); cursor: pointer;
  }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
  }

  /* LAYOUT */
  .layout { display: flex; height: calc(100vh - 52px); }
  .sidebar {
    width: 210px; min-width: 210px;
    border-right: 0.5px solid var(--border);
    padding: 1rem 0; overflow-y: auto;
    display: flex; flex-direction: column; gap: 1px;
  }
  .sidebar-section { padding: 8px 1rem 4px; font-size: 10px; font-weight: 600; letter-spacing: .06em; color: var(--faint); text-transform: uppercase; }
  .nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 1rem; font-size: 13px; color: var(--muted);
    cursor: pointer; border-right: 2px solid transparent;
    transition: all .1s; user-select: none;
  }
  .nav-item:hover { background: var(--bg); color: var(--text); }
  .nav-item.active { background: var(--bg); color: var(--text); font-weight: 500; border-right-color: var(--accent); }
  .nav-item .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .nav-divider { height: 0.5px; background: var(--border); margin: 8px 1rem; }

  .main { flex: 1; overflow-y: auto; }
  .page { display: none; padding: 1.5rem; }
  .page.active { display: block; }

  /* PAGE HEADER */
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.25rem; }
  .page-title { font-size: 18px; font-weight: 600; letter-spacing: -.02em; }
  .page-sub { font-size: 12px; color: var(--faint); margin-top: 2px; }
  .header-actions { display: flex; gap: 8px; }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 500; padding: 6px 14px;
    border-radius: 8px; border: 0.5px solid var(--border-md);
    background: var(--surface); color: var(--text); cursor: pointer;
    transition: all .12s;
  }
  .btn:hover { background: var(--bg); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-dark); }

  /* KPI GRID */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .kpi-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.1rem; }
  .kpi-label { font-size: 11px; color: var(--faint); margin-bottom: 6px; }
  .kpi-value { font-size: 24px; font-weight: 600; letter-spacing: -.02em; }
  .kpi-delta { font-size: 11px; color: var(--faint); margin-top: 4px; }
  .delta-up { color: #0F6E56; }
  .delta-down { color: #A32D2D; }

  /* CLIENTS GRID */
  .clients-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
  .client-card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 1rem 1.1rem;
    cursor: pointer; transition: border-color .15s, box-shadow .15s;
  }
  .client-card:hover { border-color: var(--border-md); }
  .client-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .client-name { font-size: 14px; font-weight: 600; }
  .status-pill { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--faint); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; }
  .dot-green { background: #1D9E75; }
  .dot-yellow { background: #EF9F27; }
  .dot-gray { background: #888780; }
  .client-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
  .tag {
    font-size: 10px; padding: 2px 8px; border-radius: 20px;
    border: 0.5px solid var(--border-md); color: var(--muted);
    background: var(--bg);
  }
  .tag-meta { background: #E6F1FB; color: #185FA5; border-color: #B5D4F4; }
  .tag-google { background: #EAF3DE; color: #3B6D11; border-color: #C0DD97; }
  .tag-ga4 { background: #EAF3DE; color: #3B6D11; border-color: #C0DD97; }
  .tag-mensajes { background: #FBEAF0; color: #993556; border-color: #F4C0D1; }
  .tag-wordpress { background: #EEEDFE; color: #534AB7; border-color: #CECBF6; }
  .client-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .cm-label { font-size: 10px; color: var(--faint); }
  .cm-val { font-size: 14px; font-weight: 600; margin-top: 1px; }
  .client-footer {
    border-top: 0.5px solid var(--border); margin-top: 10px; padding-top: 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .last-sync { font-size: 10px; color: var(--faint); }

  /* CLIENT DETAIL */
  .detail-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem;
    padding-bottom: 1rem; border-bottom: 0.5px solid var(--border);
  }
  .back-btn {
    background: none; border: 0.5px solid var(--border-md); cursor: pointer;
    color: var(--muted); font-size: 18px; padding: 5px 9px;
    border-radius: 8px; display: flex; align-items: center;
  }
  .back-btn:hover { background: var(--bg); }
  .detail-name { font-size: 18px; font-weight: 600; letter-spacing: -.02em; }
  .detail-sub { font-size: 12px; color: var(--faint); }
  .detail-actions { margin-left: auto; display: flex; gap: 8px; }

  /* WIDGETS */
  .widgets-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
  .widget {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 1rem 1.1rem;
  }
  .widget-full { grid-column: 1 / -1; }
  .widget-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .widget-title { font-size: 11px; font-weight: 600; color: var(--faint); letter-spacing: .04em; text-transform: uppercase; }
  .widget-kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
  .wk-label { font-size: 10px; color: var(--faint); }
  .wk-val { font-size: 20px; font-weight: 600; letter-spacing: -.02em; margin-top: 2px; }
  .wk-delta { font-size: 10px; color: var(--faint); margin-top: 2px; }
  .chart-wrap { position: relative; width: 100%; height: 130px; }

  /* MENSAJES */
  .msgs-list { margin-top: 4px; }
  .msg-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 0; border-bottom: 0.5px solid var(--border); font-size: 13px;
  }
  .msg-row:last-child { border-bottom: none; }
  .msg-name { font-weight: 500; }
  .msg-right { display: flex; align-items: center; gap: 8px; }
  .msg-count { color: var(--muted); font-size: 12px; }
  .msg-badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: #E1F5EE; color: #0F6E56; }

  /* ADD CLIENT MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.4); align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: var(--radius-lg);
    border: 0.5px solid var(--border-md); padding: 1.5rem;
    width: 480px; max-width: 95vw;
  }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 11px; font-weight: 600; color: var(--faint); letter-spacing: .04em; text-transform: uppercase; margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%; padding: 8px 12px; border-radius: 8px;
    border: 0.5px solid var(--border-md); background: var(--bg);
    color: var(--text); font-size: 13px;
  }
  .form-input:focus { outline: none; border-color: var(--accent); }
  .channel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .channel-opt {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 10px; border-radius: 8px; border: 0.5px solid var(--border-md);
    cursor: pointer; font-size: 12px; background: var(--bg);
    transition: all .1s;
  }
  .channel-opt input { display: none; }
  .channel-opt.selected { border-color: var(--accent); background: #E1F5EE; color: #0F6E56; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1.25rem; }

  /* LOADING */
  .loading-state { text-align: center; padding: 3rem; color: var(--faint); font-size: 13px; }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border-md); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 2.5rem; color: var(--faint); font-size: 13px; }
  .empty-icon { font-size: 32px; margin-bottom: 8px; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-dot"></div>
    pintamkt
  </div>
  <div class="topbar-right">
    <select class="period-select" id="period-select" onchange="onPeriodChange()">
      <option value="7">Últimos 7 días</option>
      <option value="30" selected>Últimos 30 días</option>
      <option value="90">Últimos 90 días</option>
    </select>
    <div class="avatar">EA</div>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">Agencia</div>
    <div class="nav-item active" id="nav-overview" onclick="showPage('overview')">
      <span>&#9632;</span> Panel general
    </div>
    <div class="nav-divider"></div>
    <div class="sidebar-section">Clientes</div>
    <div id="sidebar-clients">
      <div class="loading-state" style="padding:1rem;font-size:11px;">Cargando...</div>
    </div>
    <div class="nav-divider"></div>
    <div class="sidebar-section">Conectar</div>
    <div class="nav-item" onclick="openModal()">+ Nuevo cliente</div>
    <div class="nav-item" style="opacity:.5;cursor:default;">&#8594; Meta Ads (próximo)</div>
    <div class="nav-item" style="opacity:.5;cursor:default;">&#8594; Google Ads (próximo)</div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- OVERVIEW -->
    <div class="page active" id="page-overview">
      <div class="page-header">
        <div>
          <div class="page-title">Panel general</div>
          <div class="page-sub" id="overview-sub">Cargando datos...</div>
        </div>
        <div class="header-actions">
          <button class="btn btn-primary" onclick="openModal()">+ Nuevo cliente</button>
        </div>
      </div>

      <div class="kpi-grid" id="overview-kpis">
        <div class="kpi-card"><div class="kpi-label">Clientes activos</div><div class="spinner" style="margin:8px 0"></div></div>
        <div class="kpi-card"><div class="kpi-label">En revisión</div><div class="spinner" style="margin:8px 0"></div></div>
        <div class="kpi-card"><div class="kpi-label">Pausados</div><div class="spinner" style="margin:8px 0"></div></div>
        <div class="kpi-card"><div class="kpi-label">Total clientes</div><div class="spinner" style="margin:8px 0"></div></div>
      </div>

      <div class="clients-grid" id="clients-grid">
        <div class="loading-state" style="grid-column:1/-1">
          <div class="spinner"></div>Cargando clientes...
        </div>
      </div>
    </div>

    <!-- CLIENT DETAIL -->
    <div class="page" id="page-client">
      <div class="detail-header">
        <button class="back-btn" onclick="showPage('overview')">&#8592;</button>
        <div>
          <div class="detail-name" id="detail-name">—</div>
          <div class="detail-sub" id="detail-sub">—</div>
        </div>
        <div class="detail-actions">
          <button class="btn">&#8595; Exportar PDF</button>
          <button class="btn btn-primary" onclick="shareClient()">&#8599; Compartir</button>
        </div>
      </div>
      <div class="widgets-grid" id="widgets-container"></div>
    </div>

  </div>
</div>

<!-- MODAL: Nuevo cliente -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">Nuevo cliente</div>
    <div class="form-group">
      <label class="form-label">Nombre</label>
      <input class="form-input" id="new-nombre" type="text" placeholder="Ej: Grand Bar">
    </div>
    <div class="form-group">
      <label class="form-label">Estado</label>
      <select class="form-input" id="new-estado">
        <option value="activo">Activo</option>
        <option value="revisar">Revisar</option>
        <option value="pausado">Pausado</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Canales</label>
      <div class="channel-grid" id="channel-grid">
        <label class="channel-opt" onclick="toggleChannel(this)"><input type="checkbox" value="meta"> Meta Ads</label>
        <label class="channel-opt" onclick="toggleChannel(this)"><input type="checkbox" value="google_ads"> Google Ads</label>
        <label class="channel-opt" onclick="toggleChannel(this)"><input type="checkbox" value="ga4"> GA4</label>
        <label class="channel-opt" onclick="toggleChannel(this)"><input type="checkbox" value="mensajes"> Mensajes</label>
        <label class="channel-opt" onclick="toggleChannel(this)"><input type="checkbox" value="wordpress"> WordPress</label>
        <label class="channel-opt" onclick="toggleChannel(this)"><input type="checkbox" value="search_console"> Search Console</label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveCliente()">Guardar cliente</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://nlouwkcytkmyjexperyt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_hIaWxoZnopBtZuaO-hy3eQ_4WAVgHDW';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allClientes = [];
let currentCliente = null;
let chartInstances = {};
let currentDays = 30;

// ─── INIT ───────────────────────────────────────────────
async function init() {
  await loadClientes();
}

// ─── CARGAR CLIENTES ────────────────────────────────────
async function loadClientes() {
  const { data, error } = await sb.from('clientes').select('*').order('nombre');
  if (error) { console.error(error); return; }
  allClientes = data || [];
  renderSidebar();
  renderOverview();
}

// ─── SIDEBAR ────────────────────────────────────────────
function renderSidebar() {
  const container = document.getElementById('sidebar-clients');
  if (!allClientes.length) { container.innerHTML = '<div style="padding:8px 1rem;font-size:11px;color:var(--faint)">Sin clientes</div>'; return; }
  container.innerHTML = allClientes.map(c => `
    <div class="nav-item" id="nav-${c.id}" onclick="showClient('${c.id}')">
      <span class="dot" style="background:${c.color || '#888'}"></span>
      ${c.nombre}
    </div>`).join('');
}

// ─── OVERVIEW ────────────────────────────────────────────
function renderOverview() {
  const activos = allClientes.filter(c => c.estado === 'activo').length;
  const revisar = allClientes.filter(c => c.estado === 'revisar').length;
  const pausados = allClientes.filter(c => c.estado === 'pausado').length;

  document.getElementById('overview-sub').textContent = `${allClientes.length} clientes · actualizado ahora`;

  document.getElementById('overview-kpis').innerHTML = `
    <div class="kpi-card"><div class="kpi-label">Clientes activos</div><div class="kpi-value">${activos}</div><div class="kpi-delta delta-up">&#8599; en operación</div></div>
    <div class="kpi-card"><div class="kpi-label">En revisión</div><div class="kpi-value">${revisar}</div><div class="kpi-delta ${revisar > 0 ? 'delta-down' : ''}">requieren atención</div></div>
    <div class="kpi-card"><div class="kpi-label">Pausados</div><div class="kpi-value">${pausados}</div><div class="kpi-delta">temporalmente</div></div>
    <div class="kpi-card"><div class="kpi-label">Total clientes</div><div class="kpi-value">${allClientes.length}</div><div class="kpi-delta">en la agencia</div></div>
  `;

  const grid = document.getElementById('clients-grid');
  if (!allClientes.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">&#128202;</div>Todavía no hay clientes. Agregá el primero.</div>';
    return;
  }

  grid.innerHTML = allClientes.map(c => {
    const dotClass = c.estado === 'activo' ? 'dot-green' : c.estado === 'revisar' ? 'dot-yellow' : 'dot-gray';
    const estadoLabel = c.estado === 'activo' ? 'Activo' : c.estado === 'revisar' ? 'Revisar' : 'Pausado';
    const tags = (c.canales || []).map(ch => `<span class="tag tag-${ch}">${labelCanal(ch)}</span>`).join('');
    return `
    <div class="client-card" onclick="showClient('${c.id}')">
      <div class="client-header">
        <div class="client-name">${c.nombre}</div>
        <div class="status-pill"><span class="status-dot ${dotClass}"></span>${estadoLabel}</div>
      </div>
      <div class="client-tags">${tags || '<span class="tag">Sin canales</span>'}</div>
      <div class="client-metrics">
        <div><div class="cm-label">Canales</div><div class="cm-val">${(c.canales||[]).length}</div></div>
        <div><div class="cm-label">Estado</div><div class="cm-val">${estadoLabel}</div></div>
        <div><div class="cm-label">Datos</div><div class="cm-val">—</div></div>
      </div>
      <div class="client-footer">
        <span class="last-sync">Pendiente de sincronización</span>
        <span style="font-size:16px;color:var(--faint)">&#8250;</span>
      </div>
    </div>`;
  }).join('');
}

function labelCanal(ch) {
  const labels = { meta: 'Meta Ads', google_ads: 'Google Ads', ga4: 'GA4', mensajes: 'Mensajes', wordpress: 'WordPress', search_console: 'Search Console', instagram: 'Instagram', whatsapp: 'WhatsApp' };
  return labels[ch] || ch;
}

// ─── CLIENTE DETAIL ──────────────────────────────────────
async function showClient(id) {
  currentCliente = allClientes.find(c => c.id === id);
  if (!currentCliente) return;

  destroyCharts();
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navEl = document.getElementById('nav-' + id);
  if (navEl) navEl.classList.add('active');

  document.getElementById('detail-name').textContent = currentCliente.nombre;
  document.getElementById('detail-sub').textContent = (currentCliente.canales || []).map(labelCanal).join(' · ') || 'Sin canales configurados';

  const container = document.getElementById('widgets-container');
  container.innerHTML = '<div class="loading-state"><div class="spinner"></div>Cargando métricas...</div>';

  showPage('client');

  const canales = currentCliente.canales || [];
  const { data: metricas } = await sb.from('metricas')
    .select('*')
    .eq('cliente_id', id)
    .gte('fecha', daysAgo(currentDays))
    .order('fecha', { ascending: true });

  const { data: mensajes } = await sb.from('mensajes')
    .select('*')
    .eq('cliente_id', id)
    .gte('fecha', daysAgo(currentDays))
    .order('fecha', { ascending: true });

  container.innerHTML = buildWidgets(canales, metricas || [], mensajes || []);
  setTimeout(() => renderWidgetCharts(canales, metricas || [], mensajes || []), 50);
}

function buildWidgets(canales, metricas, mensajes) {
  let html = '';

  if (canales.includes('meta')) {
    const d = aggregateMetricas(metricas, 'meta');
    html += `
    <div class="widget">
      <div class="widget-header">
        <div class="widget-title">Meta Ads</div>
        <span style="font-size:10px;color:var(--faint)">${currentDays} días</span>
      </div>
      <div class="widget-kpis">
        <div><div class="wk-label">Alcance</div><div class="wk-val">${d.reach || '—'}</div><div class="wk-delta">impressions</div></div>
        <div><div class="wk-label">Clics</div><div class="wk-val">${d.clicks || '—'}</div><div class="wk-delta">link clicks</div></div>
        <div><div class="wk-label">Gasto</div><div class="wk-val">${d.spend || '—'}</div><div class="wk-delta">USD</div></div>
      </div>
      <div class="chart-wrap"><canvas id="chart-meta" role="img" aria-label="Métricas Meta Ads">Datos de Meta Ads</canvas></div>
    </div>`;
  }

  if (canales.includes('google_ads')) {
    const d = aggregateMetricas(metricas, 'google_ads');
    html += `
    <div class="widget">
      <div class="widget-header">
        <div class="widget-title">Google Ads</div>
        <span style="font-size:10px;color:var(--faint)">${currentDays} días</span>
      </div>
      <div class="widget-kpis">
        <div><div class="wk-label">Impresiones</div><div class="wk-val">${d.impressions || '—'}</div><div class="wk-delta">total</div></div>
        <div><div class="wk-label">Clics</div><div class="wk-val">${d.clicks || '—'}</div><div class="wk-delta">total</div></div>
        <div><div class="wk-label">CPC prom.</div><div class="wk-val">${d.cpc || '—'}</div><div class="wk-delta">USD</div></div>
      </div>
      <div class="chart-wrap"><canvas id="chart-google" role="img" aria-label="Métricas Google Ads">Datos de Google Ads</canvas></div>
    </div>`;
  }

  if (canales.includes('mensajes')) {
    const total = mensajes.reduce((s, m) => s + (m.cantidad || 0), 0);
    const resp = mensajes.reduce((s, m) => s + (m.respondidos || 0), 0);
    const tasa = total > 0 ? Math.round(resp / total * 100) : 0;
    const byCanal = {};
    mensajes.forEach(m => { byCanal[m.canal] = (byCanal[m.canal] || 0) + (m.cantidad || 0); });

    html += `
    <div class="widget">
      <div class="widget-header">
        <div class="widget-title">Mensajes</div>
        <span style="font-size:10px;color:var(--faint)">${currentDays} días</span>
      </div>
      <div class="widget-kpis">
        <div><div class="wk-label">Total</div><div class="wk-val">${total || '—'}</div><div class="wk-delta">mensajes</div></div>
        <div><div class="wk-label">Respondidos</div><div class="wk-val">${resp || '—'}</div><div class="wk-delta">${tasa}% tasa</div></div>
        <div><div class="wk-label">Sin resp.</div><div class="wk-val">${total - resp || '—'}</div><div class="wk-delta">pendientes</div></div>
      </div>
      <div class="msgs-list">
        ${['whatsapp','instagram','facebook'].map(c => `
        <div class="msg-row">
          <span class="msg-name">${labelCanal(c)}</span>
          <div class="msg-right">
            <span class="msg-count">${byCanal[c] || 0} msgs</span>
            ${byCanal[c] > 0 ? '<span class="msg-badge">activo</span>' : ''}
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  }

  if (canales.includes('ga4')) {
    html += `
    <div class="widget">
      <div class="widget-header">
        <div class="widget-title">GA4 Analytics</div>
        <span style="font-size:10px;color:var(--faint)">${currentDays} días</span>
      </div>
      <div class="widget-kpis">
        <div><div class="wk-label">Sesiones</div><div class="wk-val">—</div><div class="wk-delta">pendiente conexión</div></div>
        <div><div class="wk-label">Usuarios</div><div class="wk-val">—</div><div class="wk-delta">pendiente conexión</div></div>
        <div><div class="wk-label">Bounce rate</div><div class="wk-val">—</div><div class="wk-delta">pendiente conexión</div></div>
      </div>
      <div style="font-size:11px;color:var(--faint);text-align:center;padding:1rem 0">Conectá GA4 para ver datos reales</div>
    </div>`;
  }

  if (canales.includes('wordpress')) {
    html += `
    <div class="widget">
      <div class="widget-header">
        <div class="widget-title">WordPress</div>
        <span style="font-size:10px;color:var(--faint)">${currentDays} días</span>
      </div>
      <div class="widget-kpis">
        <div><div class="wk-label">Páginas</div><div class="wk-val">—</div></div>
        <div><div class="wk-label">Posts</div><div class="wk-val">—</div></div>
        <div><div class="wk-label">Formularios</div><div class="wk-val">—</div></div>
      </div>
      <div style="font-size:11px;color:var(--faint);text-align:center;padding:1rem 0">Conectá la URL del sitio WordPress</div>
    </div>`;
  }

  if (!html) {
    html = `<div class="widget widget-full"><div class="empty-state"><div class="empty-icon">&#128202;</div>No hay canales configurados para este cliente.</div></div>`;
  }

  return html;
}

function aggregateMetricas(metricas, plataforma) {
  const rows = metricas.filter(m => m.plataforma === plataforma);
  if (!rows.length) return {};
  const totals = {};
  rows.forEach(r => {
    const d = r.datos || {};
    Object.keys(d).forEach(k => { totals[k] = (totals[k] || 0) + (parseFloat(d[k]) || 0); });
  });
  const fmt = v => v >= 1000 ? (v/1000).toFixed(1)+'K' : Math.round(v);
  return {
    reach: fmt(totals.reach || totals.impressions || 0),
    clicks: fmt(totals.clicks || totals.link_clicks || 0),
    spend: totals.spend ? '$' + totals.spend.toFixed(0) : null,
    impressions: fmt(totals.impressions || 0),
    cpc: totals.cpc ? '$' + totals.cpc.toFixed(2) : null,
  };
}

function renderWidgetCharts(canales, metricas) {
  const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const gridColor = dark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';

  if (canales.includes('meta')) {
    const rows = metricas.filter(m => m.plataforma === 'meta').slice(-14);
    const labels = rows.map(r => r.fecha.slice(5));
    const data = rows.map(r => r.datos?.clicks || r.datos?.link_clicks || 0);
    const ctx = document.getElementById('chart-meta');
    if (ctx) {
      chartInstances['meta'] = new Chart(ctx, {
        type: 'bar',
        data: { labels, datasets: [{ data, backgroundColor: '#1D9E75', borderRadius: 3 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
          scales: { x: { grid: { display: false }, ticks: { font: { size: 9 } } }, y: { grid: { color: gridColor }, ticks: { font: { size: 9 } } } } }
      });
    }
  }

  if (canales.includes('google_ads')) {
    const rows = metricas.filter(m => m.plataforma === 'google_ads').slice(-14);
    const labels = rows.map(r => r.fecha.slice(5));
    const data = rows.map(r => r.datos?.clicks || 0);
    const ctx = document.getElementById('chart-google');
    if (ctx) {
      chartInstances['google'] = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets: [{ data, borderColor: '#378ADD', backgroundColor: 'rgba(55,138,221,0.1)', fill: true, tension: 0.3, pointRadius: 2 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
          scales: { x: { grid: { display: false }, ticks: { font: { size: 9 } } }, y: { grid: { color: gridColor }, ticks: { font: { size: 9 } } } } }
      });
    }
  }
}

function destroyCharts() {
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};
}

// ─── PÁGINAS ─────────────────────────────────────────────
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  if (page === 'overview') {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('nav-overview').classList.add('active');
  }
}

// ─── PERIOD ──────────────────────────────────────────────
function onPeriodChange() {
  currentDays = parseInt(document.getElementById('period-select').value);
  if (currentCliente) showClient(currentCliente.id);
}

// ─── HELPERS ─────────────────────────────────────────────
function daysAgo(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return d.toISOString().slice(0, 10);
}

function shareClient() {
  if (!currentCliente) return;
  const url = window.location.origin + '?cliente=' + currentCliente.slug;
  navigator.clipboard.writeText(url).then(() => alert('Link copiado: ' + url));
}

// ─── MODAL ───────────────────────────────────────────────
function openModal() { document.getElementById('modal-overlay').classList.add('open'); }
function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}
function toggleChannel(el) { el.classList.toggle('selected'); }

async function saveCliente() {
  const nombre = document.getElementById('new-nombre').value.trim();
  if (!nombre) { alert('Ingresá un nombre'); return; }
  const estado = document.getElementById('new-estado').value;
  const canales = Array.from(document.querySelectorAll('#channel-grid .selected input')).map(i => i.value);
  const slug = nombre.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-');

  const { error } = await sb.from('clientes').insert({ nombre, slug, estado, canales });
  if (error) { alert('Error: ' + error.message); return; }
  closeModal();
  document.getElementById('new-nombre').value = '';
  document.querySelectorAll('#channel-grid .selected').forEach(el => el.classList.remove('selected'));
  await loadClientes();
}

// ─── ARRANCAR ────────────────────────────────────────────
init();
</script>
